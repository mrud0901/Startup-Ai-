<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width,initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_11 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_11" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_11');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

renderer.setSize(width, height);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0x00529b, 2);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

// Create an "AI Core" - a wireframe sphere with internal points
const geometry = new THREE.IcosahedronGeometry(1, 1);
const material = new THREE.MeshPhongMaterial({
    color: 0x00529b,
    wireframe: true,
    transparent: true,
    opacity: 0.3
});
const core = new THREE.Mesh(geometry, material);
scene.add(core);

const innerGeo = new THREE.IcosahedronGeometry(0.5, 0);
const innerMat = new THREE.MeshPhongMaterial({
    color: 0xff8c00, // Accent Orange
    emissive: 0xff8c00,
    emissiveIntensity: 0.5
});
const innerCore = new THREE.Mesh(innerGeo, innerMat);
scene.add(innerCore);

camera.position.z = 3;

let mouseX = 0;
let mouseY = 0;

window.addEventListener('mousemove', (event) => {
    mouseX = (event.clientX / window.innerWidth) - 0.5;
    mouseY = (event.clientY / window.innerHeight) - 0.5;
});

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

function animate() {
    requestAnimationFrame(animate);
    
    core.rotation.y += 0.005;
    core.rotation.z += 0.002;
    
    innerCore.rotation.y -= 0.01;
    
    // Smooth mouse following
    core.position.x += (mouseX * 0.5 - core.position.x) * 0.05;
    core.position.y += (-mouseY * 0.5 - core.position.y) * 0.05;
    
    renderer.render(scene, camera);
}

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_11 -->


</body></html>
